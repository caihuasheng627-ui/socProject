# SkinVision AI — Docker 一键部署
# 用法:
#   cp backend/.env.example backend/.env   # 可选填 DEEPSEEK_API_KEY
#   docker compose up --build -d
# Web+API 同源: http://localhost:8080  （/api 由 nginx 反代到后端）
# 直接 API: http://localhost:8000
# 公网打开 :8080 即自动连后端，无需控制台设置 localStorage
services:
  api:
    build: .
    container_name: skinvision-api
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      PRED_CACHE_TTL_HOURS: ${PRED_CACHE_TTL_HOURS:-6}
      USD_CNY_RATE: ${USD_CNY_RATE:-7.2}
      USE_BUFF_LIVE: ${USE_BUFF_LIVE:-0}
      ENABLE_INCREMENTAL_TRAIN: ${ENABLE_INCREMENTAL_TRAIN:-0}
      # 设为 1 时用镜像内 seed 库覆盖 volume（把云端 154 升到全量 681）
      RESET_DB_FROM_SEED: ${RESET_DB_FROM_SEED:-0}
    volumes:
      # 持久化 SQLite(持仓/预警/缓存),重启不丢
      - sqlite-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端静态托管 + /api 反代到后端（打开 :8080 即自动连后端）
  web:
    image: nginx:alpine
    container_name: skinvision-web
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./data.js:/usr/share/nginx/html/data.js:ro
      - ./i18n.js:/usr/share/nginx/html/i18n.js:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./deploy/nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  sqlite-data:
