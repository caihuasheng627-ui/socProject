openapi: 3.0.3
info:
  title: SkinVision AI API
  description: |
    CS2 饰品 AI 智能分析平台后端 API 规范

    **数据源**:
    - BUFF API (主力, 中国市场)
    - Skinport API (辅助, 免费, 稳定)
    - Kaggle CS:GO Price Dataset (历史训练)

    **ML 模型** (来自策划书 5.1-5.3):
    - 回归: ARIMA / XGBoost / LightGBM / RandomForest / LSTM / GRU
    - 分类: LogisticRegression / RandomForest / XGBoost / LightGBM

    **LLM**: DeepSeek-V3 (中文优化)
    **RAG**: LangChain + Qdrant / pgvector
    **Agent**: 双 Agent 辩论机制 (🐂 Bull vs 🐻 Bear)
  version: 1.2.0
  contact:
    name: 蔡华升 (前端) / 课程组
    email: caihuasheng627@users.noreply.github.com

servers:
  - url: http://localhost:8000
    description: 本地开发
  - url: https://api.skinvision.ai
    description: 生产环境 (TBD)

tags:
  - name: Dashboard
    description: 行情数据
  - name: Prediction
    description: AI 预测
  - name: RAG
    description: RAG 知识库
  - name: Chat
    description: AI 对话
  - name: Debate
    description: 双 Agent 辩论
  - name: News
    description: 资讯流
  - name: Alerts
    description: 价格预警
  - name: Portfolio
    description: 模拟持仓
  - name: Models
    description: 模型对比

paths:
  # ============ 行情数据 ============
  /api/skins:
    get:
      tags: [Dashboard]
      summary: 获取饰品列表
      description: 支持按类别筛选,返回当前价格 + 涨跌幅 + 流动性
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [rifle, sniper, pistol, knife, gloves, case]
        - name: sort
          in: query
          schema:
            type: string
            enum: [price_desc, price_asc, change7d_desc, change7d_asc, volume_desc]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skin'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/skins/{skinId}:
    get:
      tags: [Dashboard]
      summary: 获取单个饰品详情
      parameters:
        - name: skinId
          in: path
          required: true
          schema:
            type: string
          example: 'ak47-fireserpent-fn'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkinDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/skins/{skinId}/kline:
    get:
      tags: [Dashboard, Prediction]
      summary: 获取 K 线数据
      description: |
        来自 BUFF API `price_history` 端点。
        返回指定天数的 OHLC + 成交量。
      parameters:
        - name: skinId
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            enum: [7, 30, 90, 180]
            default: 90
        - name: interval
          in: query
          schema:
            type: string
            enum: [1d, 1h]
            default: '1d'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  skinId:
                    type: string
                  interval:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/KLinePoint'
                  ma7:
                    type: array
                    items:
                      type: number
                  ma30:
                    type: array
                    items:
                      type: number
                  volumes:
                    type: array
                    items:
                      $ref: '#/components/schemas/VolumePoint'

  # ============ AI 预测 ============
  /api/predict:
    post:
      tags: [Prediction]
      summary: 多模型价格预测
      description: |
        6 回归模型 + 4 分类模型综合预测。
        训练方法见策划书 5.5 节: TimeSeriesSplit + Walk-Forward。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skinId, horizon]
              properties:
                skinId:
                  type: string
                  example: 'ak47-fireserpent-fn'
                horizon:
                  type: integer
                  enum: [7, 30]
                  description: 预测天数
                models:
                  type: array
                  items:
                    type: string
                    enum: [arima, xgboost, lightgbm, randomforest, lstm, gru]
                  description: 指定模型,默认全部
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/predict/entry-range:
    post:
      tags: [Prediction]
      summary: 计算推荐入场区间
      description: 基于波动率 + 共识度 + 当前价格动态计算
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skinId]
              properties:
                skinId:
                  type: string
                riskLevel:
                  type: string
                  enum: [conservative, moderate, aggressive]
                  default: moderate
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  entryLow:
                    type: number
                  entryHigh:
                    type: number
                  stopLoss:
                    type: number
                  target7d:
                    type: number
                  target30d:
                    type: number

  # ============ RAG 解释 ============
  /api/explain/{skinId}:
    get:
      tags: [RAG]
      summary: RAG 解释价格变动原因
      description: |
        检索 RAG 知识库(Valve 公告 / Steam 新闻 / HLTV 赛事 / Reddit / 历史日报),
        由 DeepSeek-V3 生成可读解释。
      parameters:
        - name: skinId
          in: path
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGExplanation'

  # ============ AI 对话 ============
  /api/chat:
    post:
      tags: [Chat]
      summary: AI 对话(支持流式)
      description: |
        自然语言问答。流式返回 SSE 事件。
        内部流程: 意图识别 → 调 ML 模型 → RAG 检索 → DeepSeek 生成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: 'AK-47 火蛇现在能买吗?'
                sessionId:
                  type: string
                  description: 会话 ID,用于多轮上下文
                context:
                  type: object
                  description: 上下文(如当前选中的饰品)
      responses:
        '200':
          description: 流式响应
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"chunk": "根据"}

                  data: {"chunk": " 6 个回归模型"}

                  data: {"done": true, "model": "deepseek-chat", "usage": {"tokens": 234}}
        '400':
          $ref: '#/components/responses/BadRequest'

  # ============ Bull / Bear / Judge 多 Agent 辩论 ============
  /api/ai/orchestrate:
    post:
      tags: [Chat]
      summary: Unified AI Chat orchestration
      description: |
        Routes one request to recommendation, Hybrid prediction,
        Bull/Bear/Judge debate, a targeted agent follow-up, or ordinary chat.
        Automatic debate requires a resolvable specific skin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIOrchestratorRequest'
      responses:
        '200':
          description: Routed AI result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIOrchestratorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/debate/{skinId}:
    post:
      tags: [Debate]
      summary: Bull / Bear / Judge 多 Agent 辩论分析
      description: |
        Bull 与 Bear 使用独立 Prompt、历史和工具权限，在同一不可变市场快照上进行迭代，
        最后由独立 Judge 校验证据并裁决。旧版字符串字段继续保留供当前前端展示。

        默认优先返回预录结果；`live=true` 现场执行。无 LLM Key 时使用同一结构化流程的明确 Mock。

        默认 3 轮:
        - Round 1: 独立分析
        - Round 2: 互相质疑
        - Round 3: 修正观点
        - Judge: 独立裁决
      parameters:
        - name: skinId
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          schema:
            type: string
            enum: [bull_bear, tech_fundamental]
            default: bull_bear
        - name: live
          in: query
          description: 🆕 true=现场重跑 DeepSeek;默认 false=预录回放(Expo)
          schema:
            type: boolean
            default: false
        - name: budget
          in: query
          description: 用户预算(USD)
          schema:
            type: number
            exclusiveMinimum: 0
        - name: riskLevel
          in: query
          description: 用户风险偏好
          schema:
            type: string
            enum: [low, medium, high]
            default: medium
        - name: horizon
          in: query
          description: 当前 Hybrid 契约仅支持 7 天
          schema:
            type: integer
            enum: [7]
            default: 7
        - name: rounds
          in: query
          description: Bull/Bear 辩论轮数；未传时读取 DEBATE_ROUNDS
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebateResult'

  /api/agent/sessions:
    post:
      tags: [Debate]
      summary: 创建用户参与式 Agent 会话
      description: 创建共享市场快照，运行初始 Bull/Bear/Judge 分析并持久化公开结果。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSessionCreateRequest'
      responses:
        '200':
          description: 会话已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'

  /api/agent/sessions/{sessionId}:
    get:
      tags: [Debate]
      summary: 获取 Agent 会话及公开历史
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 会话状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agent/sessions/{sessionId}/message:
    post:
      tags: [Debate]
      summary: 向 Bull、Bear 或 Judge 定向发送消息
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSessionMessageRequest'
      responses:
        '200':
          description: 更新后的会话状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agent/sessions/{sessionId}/round:
    post:
      tags: [Debate]
      summary: Run one user-participating debate round
      description: Runs Bull, then Bear with the new Bull opinion, then Judge with both opinions and the user message.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSessionRoundRequest'
      responses:
        '200':
          description: Updated session including the new sequential round
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ 资讯流 ============
  /api/news:
    get:
      tags: [News]
      summary: 获取新闻资讯
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sentiment
          in: query
          schema:
            type: string
            enum: [positive, negative, neutral]
        - name: source
          in: query
          schema:
            type: string
            enum: [valve, steam, hltv, reddit, internal]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsItem'

  # ============ 价格预警 ============
  /api/alerts:
    get:
      tags: [Alerts]
      summary: 获取预警列表
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
    post:
      tags: [Alerts]
      summary: 创建价格预警
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skinId, type, targetPrice]
              properties:
                skinId:
                  type: string
                type:
                  type: string
                  enum: [above, below]
                targetPrice:
                  type: number
                note:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

  /api/alerts/{alertId}:
    delete:
      tags: [Alerts]
      summary: 删除预警
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ 模拟持仓 ============
  /api/portfolio:
    get:
      tags: [Portfolio]
      summary: 获取持仓列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PortfolioItem'
    post:
      tags: [Portfolio]
      summary: 添加持仓
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skinId, buyPrice, quantity]
              properties:
                skinId:
                  type: string
                buyPrice:
                  type: number
                quantity:
                  type: integer
                buyDate:
                  type: string
                  format: date
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioItem'

  /api/portfolio/{itemId}:
    delete:
      tags: [Portfolio]
      summary: 平仓(删除持仓)
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 成功
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ 🆕 组合诊断(方案 B 核心创新)============
  /api/portfolio/value_history:
    get:
      tags: [Portfolio]
      summary: 持仓总市值历史曲线
      description: |
        SQL 聚合:`portfolio JOIN price_history GROUP BY date`。
        用于「我的库存」页总值曲线(冷启动用已落库历史价回填)。
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 90
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  dates:
                    type: array
                    items:
                      type: string
                  values:
                    type: array
                    items:
                      type: number
                  total:
                    type: number

  /api/portfolio/diagnose:
    post:
      tags: [Portfolio]
      summary: AI 组合诊断(三块输出)
      description: |
        方案 B 核心创新。逐件 Hybrid 预测(走 predictions 缓存)→ 三块固定输出:
          1. 7/30 天库存总值预估区间
          2. 逐件调仓建议(卖/持/加)+ RAG 理由
          3. 风险贡献 Top N(波动 × 市值)
        库存 >20 件时分批。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioDiagnosis'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ============ 模型对比 ============
  /api/models/comparison:
    get:
      tags: [Models]
      summary: 获取模型对比数据
      description: 6 回归 + 4 分类模型,所有指标
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  regression:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelResult'
                  classification:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelResult'
                  buyAndHold:
                    $ref: '#/components/schemas/ModelResult'

  /api/models/backtest:
    get:
      tags: [Models]
      summary: 回测收益曲线数据
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 60
        - name: skinId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  dates:
                    type: array
                    items:
                      type: string
                  series:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: number

  /api/models/shap:
    get:
      tags: [Models]
      summary: SHAP 特征重要性
      parameters:
        - name: model
          in: query
          schema:
            type: string
            enum: [xgboost, lightgbm]
            default: xgboost
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    feature:
                      type: string
                    importance:
                      type: number

  # ============ 市场日报 ============
  /api/daily-report:
    get:
      tags: [News]
      summary: 获取每日 AI 市场报告
      description: 每日 09:00 自动生成,可指定日期查询历史
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReport'

  # ============ 系统状态 ============
  /api/health:
    get:
      tags: [Dashboard]
      summary: 健康检查
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded, down]
                  dataSources:
                    type: object
                  models:
                    type: object
                  timestamp:
                    type: string
                    format: date-time

components:
  # ============ Schemas ============
  schemas:
    Skin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [步枪, 狙击枪, 手枪, 刀具, 手套, 箱子]
        wear:
          type: string
        price:
          type: number
          description: 当前价格 (CNY)
        change24h:
          type: number
          description: 24h 涨跌幅(%)
        change7d:
          type: number
        volume24h:
          type: integer
        liquidity:
          type: integer
          minimum: 0
          maximum: 100
        rarity:
          type: integer
          minimum: 1
          maximum: 7
        image:
          type: string
        source:
          type: string
          enum: [BUFF, Skinport]

    SkinDetail:
      allOf:
        - $ref: '#/components/schemas/Skin'
        - type: object
          properties:
            steamPrice:
              type: number
            listings:
              type: integer
            orders:
              type: integer
            daysSinceRelease:
              type: integer

    KLinePoint:
      type: object
      properties:
        date:
          type: string
          example: '7/15'
        open:
          type: number
        close:
          type: number
        high:
          type: number
        low:
          type: number

    VolumePoint:
      type: object
      properties:
        date:
          type: string
        volume:
          type: integer
        direction:
          type: integer
          enum: [-1, 1]

    PredictionResult:
      type: object
      properties:
        skinId:
          type: string
        horizon:
          type: integer
        currentPrice:
          type: number
        predictions:
          type: array
          items:
            type: object
            properties:
              model:
                type: string
              type:
                type: string
                enum: [统计, ML, DL]
              price:
                type: number
              change:
                type: number
              confidence:
                type: number
                minimum: 0
                maximum: 100
        consensus:
          type: object
          properties:
            score:
              type: number
              minimum: 0
              maximum: 100
            level:
              type: string
              enum: [low, medium, high, very_high]
        entryRange:
          type: object
          properties:
            low:
              type: number
            high:
              type: number
        targetPrice:
          type: number
        generatedAt:
          type: string
          format: date-time

    AIOrchestratorRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        action:
          type: string
          enum: [auto, recommend, predict, debate, chat]
          default: auto
        skinId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        targetAgent:
          type: string
          enum: [bull, bear, judge]
          nullable: true
        budget:
          type: number
          exclusiveMinimum: 0
          nullable: true
        horizonDays:
          type: integer
